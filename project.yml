name: AgentPocket
options:
  bundleIdPrefix: ai.agentpocket
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.0.2"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.1.2"

targets:
  AgentPocket:
    type: application
    platform: iOS
    sources:
      - AgentPocket
    dependencies:
      - package: SwiftTerm
      - package: MarkdownUI
      - package: Highlightr
    settings:
      base:
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: AgentPocket/Info.plist
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: ai.agentpocket.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
